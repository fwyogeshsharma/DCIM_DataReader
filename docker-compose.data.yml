# Data stores only — Postgres (TimescaleDB) + Redis on localhost.
# App (dcs/edr) runs as native binaries on the VM, not in containers.
#   docker-compose -f docker-compose.data.yml up -d
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: fwdcim
      POSTGRES_PASSWORD: fwdcim
      POSTGRES_DB: fwdcim
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fwdcim -d fwdcim"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
