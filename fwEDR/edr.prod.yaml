# EDR demo config — identical to local. Runs with host networking so 127.0.0.1
# reaches the simulator (run separately on this same box) and DCS on :9090.
identity:
  org_id:     "faber"
  network_id: "net-prod"
  group_id:   "grp-core"
  reader_id:  ""

dcs:
  endpoint: "localhost:9090"
  tls:
    insecure: true

queue:
  max_bytes: 536870912  # 512 MB

publisher:
  batch_size:        512
  flush_interval_ms: 200
  max_in_flight:     8

# Simulator topology JSON — absolute path on the VM (native run, no container).
topology_file: "/home/fabercomp_gmail_com/DCIM/Datacenter_Network_Simulator/topologies/dual_dc_enterprise.json"

discovery:
  subnets:
    - "192.168.1.0/24"
    - "192.168.2.0/24"
  snmp_agent: "127.0.0.1"
  seed_ip:    "192.168.0.7"
  interval_hours: 0
  enrich:         true

snmp:
  community:           "public"
  version:             2
  poll_interval_ms:    60000
  fast_interval_ms:     60000   # liveness Get cadence
  medium_interval_ms:   180000  # interface state walks — slower = less CPU
  slow_interval_ms:     600000  # heavy counter/HR walks (mostly off here)
  topology_interval_ms: 900000  # LLDP refresh — rarely changes
  timeout_ms:          5000
  retries:             0
  trap_addr:           "127.0.0.1:162"
  mgmt_port:           1161   # simulator live-name agent (host networking → reaches sim)
  liveness_interval_ms: 30000
  max_concurrent:      3
  rate_limit_per_sec:  30
  walk_medium:         true
  walk_topology:       false
  walk_slow:           false
  walk_sensors:        true
  walk_server_health:  false   # servers are polled via Redfish (see redfish: block), not SNMP
  breaker_threshold:   3
  breaker_cooldown_ms: 30000
  metrics_log_interval_ms: 0
  shards:              1
  shard_base_port:     16100
  shard_spawn:         false
  shard_responder_path: ""
  shard_data_dir:       ""

gnmi:
  enabled:          true
  proxy_addr:       "127.0.0.1:50051"
  fallback_port:    57400
  proxy_probe_interval_ms: 5000
  poll_interval_ms: 60000   # gNMI SAMPLE interval; higher = less stream/CPU (was 30000)
  tls:
    insecure: true
  username: ""
  password: ""

bacnet:
  enabled:          true
  port:             47808
  poll_interval_ms: 60000   # ReadPropertyMultiple cadence; higher = less CPU (was 30000)
  timeout_ms:       2000
  retries:          1
  read_circuits:    true
  objects_per_read: 12
  use_cov:          true
  cov_lifetime_sec: 300

# Servers expose OS usage (CPU/mem/disk/net via the Oem extension) AND BMC
# hardware health (temps/fans/PSU/power/chassis state) over Redfish on the mgmt
# IP. One light pull per interval — the server analog of gNMI for sw/routers.
redfish:
  enabled:          true
  port:             443
  username:         "admin"
  password:         "password"
  poll_interval_ms: 60000   # BMC GET cadence; higher = less CPU (was 30000)
  timeout_ms:       5000
  max_concurrent:   4
  tls_insecure:     false   # simulator serves plain HTTP; set true for HTTPS BMCs

# Downstream control plane — apply UI edits down to devices via SNMP SET / Redfish.
command_apply:
  enabled:          true
  dcs_base_url:     "http://localhost:8081"   # DCS rest.addr in prod (NOT :9090 gRPC)
  command_key:      "fw-control-7b1c9e2a4d"   # must match dcs.prod.yaml rest.command_key
  poll_interval_ms: 30000
  snmp_set_agent:   "127.0.0.1"               # sim on-box; "" = device IP for real devices
  snmp_set_port:    1161
  snmp_set_community: ""

# Threshold sync — fetch per-device thresholds up into DCS device_thresholds.
threshold_sync:
  enabled:          true
  agent:            "127.0.0.1"
  port:             1161
  community:        ""
  poll_interval_ms: 300000

log:
  level:  "info"
  format: "json"
