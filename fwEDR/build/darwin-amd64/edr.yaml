identity:
  org_id:     "faber"
  network_id: "net-prod"
  group_id:   "grp-core"
  reader_id:  ""
  # datacenter_id and floor_id come from topology JSON per device — not set here

dcs:
  endpoint: "localhost:9090"
  tls:
    insecure: true

queue:
  max_bytes: 536870912  # 512 MB

# EDR → DCS batching. Higher max_in_flight + batch_size drain the local queue
# faster than the gNMI/SNMP producers fill it, so it never reaches max_bytes and
# starts dropping. Raise max_in_flight if DCS has spare ingest capacity.
publisher:
  batch_size:        512
  flush_interval_ms: 200
  max_in_flight:     8

# Simulator topology file — EDR reads device IPs, datacenter, country, city,
# rack, room etc. from this JSON. Required to populate location columns in DB.
topology_file: "C:\\Users\\Faber\\Documents\\DCIM_DataReader\\Datacenter_Network_Simulator\\topologies\\dual_dc_enterprise.json"

# Subnet discovery — only active when topology_file is "".
discovery:
  subnets:
    - "192.168.1.0/24"
    - "192.168.2.0/24"
  snmp_agent: "127.0.0.1"
  seed_ip:    "192.168.0.7"
  interval_hours: 0      # 0 = no auto-rediscovery; EDR stays idle after the one-shot walk (manual rediscovery via --rediscover)
  enrich:         true   # one-time post-walk ipAdEntAddr pass — populates interface_addresses + OOB/loopback IPs (its log noise is demoted to Debug)

snmp:
  community:           "public"
  version:             2
  poll_interval_ms:    30000
  timeout_ms:          5000   # sim is slow under load; give walks time to complete instead of timing out + retrying
  retries:             0      # don't double-hit a slow single-process simulator
  trap_addr:           "127.0.0.1:162"
  mgmt_port:           1161   # SIMULATOR-ONLY SET/mgmt agent. Serves the LIVE in-memory device name on a GET sysName, so the liveness heartbeat reads the truly-current name instantly instead of lagging the 161 .snmprec. Leave UNSET (0) in production — real devices have no such agent.
  liveness_interval_ms: 15000 # after the one-shot walk, do a single sysName+uptime GET per device every 15s (NOT a full re-walk). Refreshes last_seen and propagates a source-side rename to the DB/UI/events cheaply (rename visible in ≤~20s). 0 = off.
  max_concurrent:      3      # GLOBAL concurrent SNMP socket cap (all tiers). The simulator is ONE snmpsim process (single asyncio loop, single UDP socket) — it serializes requests, so high concurrency is wasted and only risks UDP-buffer bursts. 3 keeps 2 heavy walks overlapped (latency hiding) + 1 slot for FAST liveness.
  rate_limit_per_sec:  30     # global SNMP req/sec token bucket — modest ceiling matched to the single serial responder.
  walk_medium:         true   # interface state (also builds interfaces table — needed for link-event interface correlation)
  walk_topology:       false  # topology comes from the JSON (instant, complete) — skip slow LLDP topology walk and avoid duplicate rows
  walk_slow:           false  # SKIP heavy counter/HR/UPS/sensor walks — biggest SNMP load, not needed for inventory or link topology
  walk_sensors:        true   # environment sensors ONLY (temperature/humidity from sensor+PDU devices) for the heatmap — light, independent of walk_slow
  walk_server_health:  false  # servers polled via Redfish (see redfish: block), not SNMP
  breaker_threshold:   3
  breaker_cooldown_ms: 30000
  metrics_log_interval_ms: 0   # 0 = no periodic "snmp poll metrics" log line (quiet once idle)
  # DECOUPLED: EDR is a pure external collector. It polls the simulator's OWN
  # snmpsim responder on 127.0.0.1:161 — that process listens on 0.0.0.0:161 and
  # routes each request to the right device by the SNMP community (= device mgmt
  # IP), exactly as a real NMS would poll real hardware. EDR no longer spawns its
  # own responders, so it has ZERO dependency on simulator file paths and does not
  # double the socket load (which caused WSAENOBUFS). SNMP is one-shot inventory
  # only (system + interfaces); gNMI proxy carries all ongoing telemetry.
  shards:              1       # no sharding — single shared responder on 161, community routes per device
  shard_base_port:     16100   # unused when shards=1
  shard_spawn:          false  # NEVER launch responders — collector stays independent of the simulator
  shard_responder_path: ""     # unused
  shard_data_dir:       ""     # unused

gnmi:
  enabled:          true    # ongoing telemetry source after the one-shot SNMP discovery walk
  # Preferred path: ONE aggregated subscription to the proxy streams telemetry,
  # status and alarms for ALL devices over a single connection (no per-device gNMI
  # connections). Devices are resolved from each notification's prefix.target.
  proxy_addr:       "127.0.0.1:50051"
  # Temporary fallback: if the proxy is unreachable, EDR opens direct per-device
  # gNMI on fallback_port, then automatically tears it down and returns to the
  # single proxy subscription once the proxy recovers.
  fallback_port:    57400
  proxy_probe_interval_ms: 5000   # how often to re-check the proxy while in fallback
  poll_interval_ms: 30000         # gNMI SAMPLE interval — periodic status/counters
  tls:
    insecure: true
  username: ""
  password: ""

# BACnet/IP — Verdigris EV2 energy monitors (device_type=energy_monitor). EDR
# polls each at mgmt_ip:47808 (ReadPropertyMultiple) and subscribes COV for push.
bacnet:
  enabled:          true
  port:             47808
  poll_interval_ms: 30000
  timeout_ms:       2000
  retries:          1
  read_circuits:    true    # also read per-circuit objects (current/kW/kWh/PF/THD)
  objects_per_read: 12      # objects per ReadPropertyMultiple (APDU-size safe)
  use_cov:          true    # SubscribeCOV push for panel + alarm objects
  cov_lifetime_sec: 300

# Redfish (HTTP) — per-server BMC on the mgmt IP. Collects OS usage (CPU/mem/disk/
# net via the Oem extension) + hardware health (temps/fans/PSU/power/chassis state)
# in one light pull per interval. The server analog of gNMI; replaces SNMP server
# health (walk_server_health is off above). Power on/off events still arrive via traps.
redfish:
  enabled:          true
  port:             443
  username:         "admin"
  password:         "password"
  poll_interval_ms: 30000
  timeout_ms:       5000
  max_concurrent:   4
  tls_insecure:     false   # simulator serves plain HTTP; set true for HTTPS BMCs

log:
  level:  "info"
  format: "json"
