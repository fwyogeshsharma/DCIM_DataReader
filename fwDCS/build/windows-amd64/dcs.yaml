log:
  level:  "info"
  format: "console"

# TimescaleDB data lifecycle. Reconciled on EVERY boot (not a one-shot
# migration): change a value, restart DCS, policies are re-applied to match.
# This is the disk-pressure knob for small/demo clouds.
#
# Durations: Go duration strings ("20m", "90m", "24h") + "Nd" day suffix ("7d").
# Empty string ("") disables that policy. enabled: false skips all of this.
#
# chunk_interval MUST be small when raw_retention is small — a chunk frees disk
# only once ALL its rows are past retention, so 1-day chunks never drop under a
# 20m retention. Keep chunk_interval <= raw_retention.
retention:
  enabled: true
  metrics:
    chunk_interval:   "5m"     # future chunk size
    raw_retention:    "20m"    # drop raw rows older than this
    compress_after:   ""       # "" = off (not worth it at 20m); e.g. "2d" in prod
    rollup_retention: "24h"    # keep 5m rollup this long for trend charts
  energy:
    chunk_interval:   "5m"
    raw_retention:    "20m"
    compress_after:   ""
    rollup_retention: "168h"   # 7d of 5m energy rollup

aggregator:
  enabled:     true
  endpoint:    "https://fwdcim.faberwork.com/api/v1/ingest"
  ingest_key:  "74613fe24e4da087f46d584c6558870a3bed6b993a6416ced4df17f9a0f1e824"
  interval_ms: 5000
  batch_limit: 1000
  org_id:      "faber"
  network_id:  "net-prod"
  group_id:    "grp-core"

# Dynamic topology hierarchy (parent-child) computed by BFS over topology_links.
# root: hostname OR any IP of the tree root. Empty = auto-pick highest-degree
# node per connected component. Works for any graph shape.
topology:
  root:                 "192.168.0.7"   # DC1-ER1 (seed/edge router); "" = auto
  recompute_interval_ms: 30000
  # Fabric-role classifier: infer device_role (core/spine/leaf/access/distribution)
  # for switches after each hierarchy recompute, from hostname + model + LLDP
  # neighbor profile. Stored in devices.device_role/role_confidence/role_source.
  classify_roles:        true
  # Optional: override classifier lookup tables/weights/thresholds without a
  # rebuild. Empty = compiled-in defaults (tuned for the simulator naming).
  # role_rules_path:     "C:\\Users\\Faber\\Desktop\\fwDCIM\\fwDCS\\role_rules.yaml"
